axes:
  - id: lojalnosc_prawda
    left: Milczeć dla świętego spokoju
    right: Nazwać to, co widzisz
    description: Napięcie między ochroną własnego spokoju a odsłonięciem prawdy.

  - id: sumienie_reguly
    left: Czekać, aż ktoś inny zareaguje
    right: Wziąć odpowiedzialność
    description: Napięcie między odsuwaniem reakcji a wejściem w trudną sytuację.

dilemmas:
  - id: slad_01
    axis_id: lojalnosc_prawda
    axis_left: Milczeć dla świętego spokoju
    axis_right: Nazwać to, co widzisz
    title: Gdy grupa poniża jedną osobę
    scenario: >
      W pracy, w grupie znajomych albo w jakimś zamkniętym kręgu jedna osoba staje się
      stałym celem żartów, docinków i upokarzających komentarzy. Nikt nie mówi wprost,
      że to przemoc. Wszyscy wolą słowo „żart” albo „taki klimat”.
      Widzisz jednak, że ta osoba coraz bardziej gaśnie, wycofuje się i przestaje się bronić.
      Możesz nic nie powiedzieć i ocalić własny spokój. Możesz też nazwać to po imieniu,
      ryzykując, że sam staniesz się problemem dla grupy.
    choice_prompt: >
      Co jest Ci dziś bliższe?
    cost_question: >
      Jeśli milczysz dla świętego spokoju, jaką cenę płaci człowiek,
      którego inni uczą się bezkarnie poniżać? A jeśli nazwiesz to, co widzisz,
      jaką cenę możesz zapłacić własnym spokojem i miejscem w tej grupie?
    hidden_cost_left: >
      Milczenie może ochronić Cię przed ciosem, ale dla drugiego człowieka
      może być dowodem, że jego godność nie była warta Twojego ryzyka.
    hidden_cost_right: >
      Nazwanie sytuacji może zatrzymać czyjąś krzywdę,
      ale może też wystawić Cię na odrzucenie, śmiech albo samotność.
    bias_warning_left: >
      Czy nie nazywasz neutralnością czegoś, co w praktyce przedłuża czyjeś upokorzenie?
    bias_warning_right: >
      Czy jesteś gotów nie tylko zareagować, ale też zostać przy tej reakcji,
      kiedy przestanie być wygodna?
    mentor_prompt: >
      W którym momencie milczenie przestaje być ostrożnością, a staje się współudziałem?
    mirror_line_left: >
      Być może ocaliłeś własny spokój, ale ktoś obok mógł zapamiętać,
      że jego ból nie był wart Twojego ryzyka.
    mirror_line_center: >
      Skoro się zatrzymałeś, to znaczy, że widzisz napięcie.
      Pomyśl: gdyby to Ciebie codziennie pomniejszano przy innych,
      czego najbardziej oczekiwałbyś od świadka?
    mirror_line_right: >
      Być może wybrałeś prawdę zamiast wygody
      i właśnie dlatego ten wybór tyle kosztuje.
    help_hint: >
      W wielu takich sytuacjach przełom zaczynał się nie od wielkiego gestu,
      ale od jednej jasnej reakcji, zachowania dowodów
      albo rozmowy z kimś, kto potrafi pomóc skuteczniej.
    bridge_prompt: >
      Jak odpowiedziałby ktoś, kto sam był kiedyś publicznie poniżany?
      Jak odpowiedziałby ktoś, kto raz milczał i pamięta to do dziś?
    tags_left:
      - milczenie
      - wygoda
      - grupa
      - unikanie
    tags_right:
      - prawda
      - reakcja
      - godność
      - ryzyko

  - id: slad_02
    axis_id: sumienie_reguly
    axis_left: Czekać, aż ktoś inny zareaguje
    axis_right: Wziąć odpowiedzialność
    title: Wiesz, że dzieje się źle, ale to jeszcze nie „Twoja rola”
    scenario: >
      Widzisz, że ktoś jest systematycznie wypychany poza wspólnotę:
      ignorowany, pomijany, ośmieszany albo przyciskany do ściany.
      Nie masz jeszcze „pełnego obrazu”, nie znasz wszystkich faktów,
      nie masz pewności, czy inni potwierdzą to samo.
      Możesz więc czekać, aż zareaguje ktoś bardziej uprawniony,
      starszy, mocniejszy albo formalnie odpowiedzialny.
      Możesz też zrobić pierwszy ruch sam:
      zapytać, wesprzeć, nazwać, poszukać pomocy.
    choice_prompt: >
      Co jest Ci dziś bliższe?
    cost_question: >
      Jeśli czekasz, aż ktoś inny zareaguje, jaką cenę płaci człowiek,
      który nadal zostaje sam? A jeśli bierzesz odpowiedzialność,
      jaką cenę możesz zapłacić ryzykiem pomyłki, konfliktem albo ciężarem sprawy?
    hidden_cost_left: >
      Czekanie może wydawać się rozsądne,
      ale dla kogoś krzywdzonego każdy kolejny dzień ma własny ciężar.
    hidden_cost_right: >
      Wzięcie odpowiedzialności może zatrzymać czyjąś samotność,
      ale może też wciągnąć Cię w trudną sytuację bez gwarancji prostego finału.
    bias_warning_left: >
      Czy nie nazywasz rozwagą czegoś, co pozwala Ci odsunąć od siebie ciężar decyzji?
    bias_warning_right: >
      Czy pamiętasz, że odwaga bez ostrożności też może zranić?
    mentor_prompt: >
      Ile cudzego cierpienia człowiek jest w stanie oglądać,
      zanim przyzna, że to już także jego sprawa?
    mirror_line_left: >
      Być może zachowałeś bezpieczny dystans,
      ale ktoś inny mógł zostać z tą sytuacją jeszcze trochę dłużej sam.
    mirror_line_center: >
      Skoro się wahasz, to znaczy, że czujesz ciężar tej decyzji.
      Pomyśl: czy sam chciałbyś, żeby inni czekali na „lepszy moment”,
      gdyby chodziło właśnie o Ciebie?
    mirror_line_right: >
      Być może wszedłeś w coś, co nie było wygodne ani pewne,
      ale właśnie tak czasem zaczyna się odpowiedzialność.
    help_hint: >
      Nie każdą sytuację trzeba od razu rozwiązać samemu.
      Czasem pierwszy uczciwy krok to nie odwracać wzroku,
      zebrać to, co wiesz, i włączyć kogoś, kto może pomóc dalej.
    bridge_prompt: >
      Jak odpowiedziałby ktoś, kto żałuje, że za długo czekał?
      Jak odpowiedziałby ktoś, kto raz zareagował za wcześnie i też zapamiętał tę cenę?
    tags_left:
      - czekanie
      - dystans
      - ostrożność
      - odsunięcie
    tags_right:
      - odpowiedzialność
      - pierwszy_krok
      - wsparcie
      - ryzyko