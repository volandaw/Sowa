wolnosc_odpowiedzialnosc:
  default_comment: >
    Wolność bez przyjęcia skutków łatwo staje się wygodą.
    Odpowiedzialność bez wolności łatwo staje się ciężarem bez ducha.

lojalnosc_prawda:
  default_comment: >
    Prawda bez relacji może ranić,
    ale relacja bez prawdy z czasem traci grunt.

skutecznosc_uczciwosc:
  default_comment: >
    Nie wszystko, co przyspiesza wynik, służy człowiekowi.
    Czasem droga niszczy to, co cel miał ocalić.

ambicja_sluzba:
  default_comment: >
    Ambicja potrafi rozszerzyć wpływ, ale nie zawsze pogłębia sens.
    Służba potrafi ocalić sens, ale czasem domaga się rezygnacji z blasku.

tozsamosc_otwartosc:
  default_comment: >
    Tożsamość bez otwartości może skamienieć.
    Otwartość bez zakorzenienia może utracić pamięć o tym, kim się jest.

sumienie_reguly:
  default_comment: >
    Reguły chronią porządek, ale nie cierpią.
    Sumienie widzi człowieka, lecz samo także może się mylić.

grupa_czlowiek:
  default_comment: >
    Czy wygoda grupy naprawdę jest spokojem,
    jeśli ktoś słabszy zostaje z tym sam?

milczenie_reakcja:
  default_comment: >
    Czy cisza naprawdę chroni spokój,
    czy tylko pozwala krzywdzie trwać dłużej?

sekret_pomoc:
  default_comment: >
    Czy zatrzymanie sekretu dla siebie pomaga,
    jeśli ktoś zostaje sam z czymś zbyt trudnym?

spokoj_nazwanie:
  default_comment: >
    Czy udawanie spokoju naprawdę rozwiązuje problem,
    czy tylko odsuwa moment, w którym trzeba go nazwać?

prawda_nadzieja:
  default_comment: >
    Musimy mieć jakąś nadzieję.

    Ale nadzieja nie musi oznaczać kłamstwa.
    Czasem nie trzeba mówić wszystkiego naraz.
    Czasem prawdziwsze od informacji jest bycie obok,
    trzymanie za rękę i niewypowiadanie słów,
    które nie niosą już pomocy.

    Prawda bez miłości może stać się okrucieństwem.
    Miłość bez prawdy może stać się samotnością.

misja_czlowieczenstwo:
  default_comment: >
    Najgroźniejsze decyzje to czasem te,
    które udają, że istnieją tylko dwie możliwości.

    Między wypuszczeniem chłopca a odebraniem mu życia
    może istnieć trzecia droga:
    unieruchomić go tak, by nie mógł ostrzec przeciwnika,
    a po zakończeniu misji przekazać, gdzie jest.

    To nadal decyzja bolesna.
    Ale człowieczeństwo często zaczyna się właśnie tam,
    gdzie ktoś w ostatniej chwili nie przestaje szukać
    mniej strasznego wyjścia.

lojalnosc_sprawiedliwosc:
  default_comment: >
    Lojalność wobec jednej osoby nie może całkiem unieważnić
    odpowiedzialności wobec skrzywdzonych.

    Nie każde ujawnienie prawdy jest zdradą.
    Czasem zdradą jest udawanie, że prawdy nie ma.

    Stara zasada mówi: nie wolno czynić zła,
    żeby wynikło z niego dobro.
    Milczenie może wyglądać jak miłość,
    ale jeśli pozwala krzywdzie trwać dalej,
    staje się współudziałem.

sprawiedliwosc_wiez:
  default_comment: >
    Sprawiedliwość zaczyna się tam,
    gdzie własne serce nie może być jedynym sędzią.

    To, że ktoś jest nam bliski,
    nie czyni jego życia ważniejszym od życia nieznajomego.
    Ale to, że ktoś jest nieznajomy,
    nie czyni jego życia mniej realnym.

    Najtrudniejsze decyzje wymagają zasad właśnie dlatego,
    że uczucia potrafią być zbyt silne.

przyjazn_zycie:
  default_comment: >
    Przyjaźń, która nigdy nie mówi „nie”,
    może stać się wygodnym opuszczeniem człowieka w chwili próby.

    Czasem lojalność nie polega na tym,
    że stoimy po czyjejś stronie.
    Czasem polega na tym,
    że stajemy między nim a krzywdą,
    którą może wyrządzić sobie albo innym.

    Gniew przyjaciela może minąć.
    Śmierć niewinnego człowieka nie mija.