title: Moje granice odpowiedzialności
subtitle: Zmieniają się czasy, zmienia się świat. Jak wyznaczać granice odpowiedzialności w zmiennej rzeczywistości, nie naruszając własnych wartości?
paragraphs:
  - >
    Jesteśmy świadkami zmian, które przyspieszają szybciej niż nasze przyzwyczajenia.
    Dotyczą polityki, gospodarki, technologii, pracy, relacji i codziennych decyzji.
  - >
    Coraz częściej działamy w warunkach pośpiechu, niepewności i nadmiaru bodźców.
    Nie wszystko da się przewidzieć. Nie wszystko da się spokojnie sprawdzić.
  - >
    W takim świecie każda decyzja ma swoją cenę.
    Każde słowo, każdy odruch, każde milczenie staje się jakąś formą odpowiedzialności.
  - >
    To nie jest test.
    To przestrzeń Twojej refleksji.