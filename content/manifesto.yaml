title: Nowe granice odpowiedzialności
subtitle: Zmieniają się czasy, zmienia się świat. Jak wyznaczać granice odpowiedzialności w zmiennej rzeczywistości, nie naruszając własnych wartości?
paragraphs:
  - >
    To nie jest test. To nie jest ankieta. To jest krótka przestrzeń,
    w której możesz zobaczyć, z czym dziś jest Ci po drodze.
  - >
    Im większy wpływ, tym mniejsza niewinność.
    Im większa wolność, tym mniej usprawiedliwień.
  - >
    Elita nie zaczyna się od przywileju.
    Zaczyna się od obowiązku więcej.
  - >
    Nie po to, by błyszczeć ponad innymi,
    lecz by wcześniej widzieć cenę własnych decyzji.